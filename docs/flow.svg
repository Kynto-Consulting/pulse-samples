<svg width="1280" height="420" viewBox="0 0 1280 420" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1280" y2="420" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0B1220"/>
      <stop offset="1" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="0" y2="1">
      <stop stop-color="#1E293B"/>
      <stop offset="1" stop-color="#0F172A"/>
    </linearGradient>
    <linearGradient id="line" x1="0" y1="0" x2="1" y2="0">
      <stop stop-color="#38BDF8"/>
      <stop offset="1" stop-color="#22C55E"/>
    </linearGradient>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0 0L12 6L0 12V0Z" fill="#38BDF8"/>
    </marker>
  </defs>

  <rect width="1280" height="420" rx="28" fill="url(#bg)"/>
  <text x="56" y="72" fill="#F8FAFC" font-size="34" font-family="Segoe UI, Arial, sans-serif" font-weight="700">Pulse end-to-end flow</text>
  <text x="56" y="106" fill="#94A3B8" font-size="18" font-family="Segoe UI, Arial, sans-serif">Backend signs the ticket, worker validates it, clients sync through the same room.</text>

  <rect x="56" y="158" width="260" height="180" rx="28" fill="url(#panel)" stroke="#334155"/>
  <text x="88" y="206" fill="#F8FAFC" font-size="28" font-family="Segoe UI, Arial, sans-serif" font-weight="700">Server sample</text>
  <text x="88" y="242" fill="#86EFAC" font-size="16" font-family="Consolas, monospace">generatePulseTicket()</text>
  <text x="88" y="282" fill="#CBD5E1" font-size="18" font-family="Segoe UI, Arial, sans-serif">Signs JWT using</text>
  <text x="88" y="310" fill="#CBD5E1" font-size="18" font-family="Segoe UI, Arial, sans-serif">roomId + userId + secret</text>

  <rect x="510" y="158" width="260" height="180" rx="28" fill="url(#panel)" stroke="#334155"/>
  <text x="542" y="206" fill="#F8FAFC" font-size="28" font-family="Segoe UI, Arial, sans-serif" font-weight="700">Pulse Worker</text>
  <text x="542" y="242" fill="#93C5FD" font-size="16" font-family="Consolas, monospace">/ws + Durable Object</text>
  <text x="542" y="282" fill="#CBD5E1" font-size="18" font-family="Segoe UI, Arial, sans-serif">Verifies JWT and routes</text>
  <text x="542" y="310" fill="#CBD5E1" font-size="18" font-family="Segoe UI, Arial, sans-serif">clients into one room broker</text>

  <rect x="964" y="158" width="260" height="180" rx="28" fill="url(#panel)" stroke="#334155"/>
  <text x="996" y="206" fill="#F8FAFC" font-size="28" font-family="Segoe UI, Arial, sans-serif" font-weight="700">Client samples</text>
  <text x="996" y="242" fill="#FDE68A" font-size="16" font-family="Consolas, monospace">native / astro / react / zustand</text>
  <text x="996" y="282" fill="#CBD5E1" font-size="18" font-family="Segoe UI, Arial, sans-serif">Send deltas, receive</text>
  <text x="996" y="310" fill="#CBD5E1" font-size="18" font-family="Segoe UI, Arial, sans-serif">broadcasts and presence</text>

  <line x1="332" y1="248" x2="494" y2="248" stroke="url(#line)" stroke-width="6" marker-end="url(#arrow)"/>
  <line x1="786" y1="248" x2="948" y2="248" stroke="url(#line)" stroke-width="6" marker-end="url(#arrow)"/>
</svg>
