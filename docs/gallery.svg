<svg width="1400" height="960" viewBox="0 0 1400 960" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1400" y2="960" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0F172A"/>
      <stop offset="1" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="0" y2="1">
      <stop stop-color="#1E293B"/>
      <stop offset="1" stop-color="#0F172A"/>
    </linearGradient>
    <linearGradient id="accent1" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#38BDF8"/>
      <stop offset="1" stop-color="#22C55E"/>
    </linearGradient>
    <linearGradient id="accent2" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#F59E0B"/>
      <stop offset="1" stop-color="#EF4444"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#000000" flood-opacity="0.25"/>
    </filter>
  </defs>

  <rect width="1400" height="960" rx="28" fill="url(#bg)"/>
  <text x="72" y="88" fill="#F8FAFC" font-size="40" font-family="Segoe UI, Arial, sans-serif" font-weight="700">Pulse Samples Preview Gallery</text>
  <text x="72" y="126" fill="#94A3B8" font-size="22" font-family="Segoe UI, Arial, sans-serif">Static visual previews for the example repo: server, native JS, Astro, React and Zustand.</text>

  <g filter="url(#shadow)">
    <rect x="72" y="172" width="388" height="310" rx="28" fill="url(#card)" stroke="#334155"/>
    <text x="104" y="220" fill="#F8FAFC" font-size="28" font-family="Segoe UI, Arial, sans-serif" font-weight="700">Server Ticket</text>
    <text x="104" y="252" fill="#93C5FD" font-size="18" font-family="Consolas, monospace">generatePulseTicket()</text>
    <rect x="104" y="282" width="324" height="28" rx="14" fill="#0B1220"/>
    <text x="122" y="301" fill="#86EFAC" font-size="14" font-family="Consolas, monospace">roomId: board-demo</text>
    <rect x="104" y="324" width="280" height="28" rx="14" fill="#0B1220"/>
    <text x="122" y="343" fill="#FDE68A" font-size="14" font-family="Consolas, monospace">userId: sample-user</text>
    <rect x="104" y="374" width="212" height="42" rx="21" fill="url(#accent1)"/>
    <text x="145" y="401" fill="#082F49" font-size="18" font-family="Segoe UI, Arial, sans-serif" font-weight="700">Mint JWT</text>
    <text x="104" y="448" fill="#94A3B8" font-size="18" font-family="Segoe UI, Arial, sans-serif">Backend-side signing before any client connects.</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="506" y="172" width="388" height="310" rx="28" fill="url(#card)" stroke="#334155"/>
    <text x="538" y="220" fill="#F8FAFC" font-size="28" font-family="Segoe UI, Arial, sans-serif" font-weight="700">Native JS</text>
    <text x="538" y="252" fill="#67E8F9" font-size="18" font-family="Consolas, monospace">new PulseClient(...)</text>
    <rect x="538" y="286" width="324" height="128" rx="18" fill="#0B1220"/>
    <text x="560" y="320" fill="#E2E8F0" font-size="15" font-family="Consolas, monospace">[status] connected</text>
    <text x="560" y="350" fill="#E2E8F0" font-size="15" font-family="Consolas, monospace">[presence] join user-42</text>
    <text x="560" y="380" fill="#E2E8F0" font-size="15" font-family="Consolas, monospace">[message] update brick-1</text>
    <circle cx="829" cy="308" r="8" fill="#22C55E"/>
    <text x="538" y="448" fill="#94A3B8" font-size="18" font-family="Segoe UI, Arial, sans-serif">Plain JavaScript transport with no framework assumptions.</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="940" y="172" width="388" height="310" rx="28" fill="url(#card)" stroke="#334155"/>
    <text x="972" y="220" fill="#F8FAFC" font-size="28" font-family="Segoe UI, Arial, sans-serif" font-weight="700">Astro Island</text>
    <text x="972" y="252" fill="#FDBA74" font-size="18" font-family="Consolas, monospace">&lt;PulseBoard /&gt;</text>
    <rect x="972" y="286" width="324" height="128" rx="18" fill="#0B1220"/>
    <text x="996" y="320" fill="#E2E8F0" font-size="15" font-family="Consolas, monospace">status: connected</text>
    <text x="996" y="352" fill="#E2E8F0" font-size="15" font-family="Consolas, monospace">send update from island</text>
    <text x="996" y="384" fill="#E2E8F0" font-size="15" font-family="Consolas, monospace">log presence + messages</text>
    <rect x="972" y="430" width="160" height="34" rx="17" fill="#FED7AA"/>
    <text x="1008" y="452" fill="#7C2D12" font-size="15" font-family="Segoe UI, Arial, sans-serif" font-weight="700">Client-side only</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="72" y="536" width="605" height="330" rx="28" fill="url(#card)" stroke="#334155"/>
    <text x="104" y="584" fill="#F8FAFC" font-size="28" font-family="Segoe UI, Arial, sans-serif" font-weight="700">React Hook</text>
    <text x="104" y="616" fill="#A5F3FC" font-size="18" font-family="Consolas, monospace">usePulse(baseUrl, token)</text>
    <rect x="104" y="650" width="541" height="168" rx="20" fill="#0B1220"/>
    <text x="130" y="690" fill="#E2E8F0" font-size="18" font-family="Segoe UI, Arial, sans-serif">Status: connected</text>
    <text x="130" y="726" fill="#E2E8F0" font-size="18" font-family="Segoe UI, Arial, sans-serif">Connected users: 3</text>
    <rect x="130" y="750" width="174" height="40" rx="20" fill="url(#accent1)"/>
    <text x="176" y="776" fill="#082F49" font-size="17" font-family="Segoe UI, Arial, sans-serif" font-weight="700">Move card</text>
    <rect x="344" y="706" width="266" height="82" rx="16" fill="#111827" stroke="#334155"/>
    <text x="364" y="735" fill="#E5E7EB" font-size="14" font-family="Consolas, monospace">lastPresence: join</text>
    <text x="364" y="763" fill="#E5E7EB" font-size="14" font-family="Consolas, monospace">lastMessage: { entity: card }</text>
    <text x="104" y="842" fill="#94A3B8" font-size="18" font-family="Segoe UI, Arial, sans-serif">Best fit when realtime state can stay local to a React screen.</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="723" y="536" width="605" height="330" rx="28" fill="url(#card)" stroke="#334155"/>
    <text x="755" y="584" fill="#F8FAFC" font-size="28" font-family="Segoe UI, Arial, sans-serif" font-weight="700">Zustand Store</text>
    <text x="755" y="616" fill="#C4B5FD" font-size="18" font-family="Consolas, monospace">createPulseStore()</text>
    <rect x="755" y="650" width="541" height="168" rx="20" fill="#0B1220"/>
    <text x="781" y="690" fill="#E2E8F0" font-size="18" font-family="Segoe UI, Arial, sans-serif">Shared socket state across the app</text>
    <rect x="781" y="720" width="210" height="30" rx="15" fill="#111827" stroke="#334155"/>
    <text x="798" y="740" fill="#E5E7EB" font-size="14" font-family="Consolas, monospace">status: connected</text>
    <rect x="781" y="762" width="234" height="30" rx="15" fill="#111827" stroke="#334155"/>
    <text x="798" y="782" fill="#E5E7EB" font-size="14" font-family="Consolas, monospace">presenceMembers: 4</text>
    <rect x="1043" y="714" width="208" height="58" rx="29" fill="url(#accent2)"/>
    <text x="1083" y="750" fill="#FFF7ED" font-size="18" font-family="Segoe UI, Arial, sans-serif" font-weight="700">Emit update</text>
    <text x="755" y="842" fill="#94A3B8" font-size="18" font-family="Segoe UI, Arial, sans-serif">Best fit when several pages or widgets reuse one connection.</text>
  </g>
</svg>
